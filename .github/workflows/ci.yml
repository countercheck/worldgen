name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -e ".[dev]" -q

      - name: Check code style
        run: python -m ruff check .

      - name: Check code formatting
        run: python -m ruff format --check .

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -e ".[dev]" -q

      - name: Run tests
        run: python -m pytest -v --tb=short

      - name: Check test coverage
        run: python -m pytest --cov=worldgen --cov-fail-under=50 --quiet || true

  required:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Linting or tests failed"
            exit 1
          fi
          echo "✅ All checks passed"
